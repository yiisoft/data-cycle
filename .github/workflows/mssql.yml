on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/mssql.yml'
      - 'composer.json'
      - 'phpunit.xml.dist'
  push:
    branches: ['master']
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/mssql.yml'
      - 'composer.json'
      - 'phpunit.xml.dist'
name: mssql

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
jobs:
  tests:
    permissions:
      contents: read
      pull-requests: write # Required by Codecov to add pull request coverage comments.
    name: PHP ${{ matrix.php }}-mssql-${{ matrix.mssql.server }}
    env:
      extensions: pdo, pdo_sqlsrv-5.12
    runs-on: ${{ matrix.mssql.os || 'ubuntu-latest' }}
    strategy:
      matrix:
        php:
          - 8.1
          - 8.2
          - 8.3
          - 8.4
          - 8.5

        mssql:
          - server: 2022-latest
            image: mcr.microsoft.com/mssql/server:2022-latest@sha256:e07b9699a2b749969f19d86563ceeea22bd3a69f7f1db85a8d1ac4bdaf0c6f56
            odbc-version: 18
            flag: "-C"
            tools-path: "/opt/mssql-tools18"

        include:
          - php: 8.3
            mssql:
              server: 2017-latest
              image: mcr.microsoft.com/mssql/server:2017-latest@sha256:0773d9c39ee51fdd581ed8119f5a29b3eab875d193b98ffd8f1d56a99de1eac8
              odbc-version: 17
              flag: ""
              tools-path: "/opt/mssql-tools"
              os: ubuntu-22.04
          - php: 8.3
            mssql:
              server: 2019-latest
              image: mcr.microsoft.com/mssql/server:2019-latest@sha256:5b89fce40832a459ad4d634e9d588ae1e4496e664d9a4a9f8baeed6949b53fef
              odbc-version: 18
              flag: "-C"
              tools-path: "/opt/mssql-tools18"

    services:
      mssql:
        image: ${{ matrix.mssql.image }}
        env:
          SA_PASSWORD: YourStrong!Passw0rd
          ACCEPT_EULA: Y
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: --name=mssql --health-cmd="${{ matrix.mssql.tools-path }}/bin/sqlcmd ${{ matrix.mssql.flag }} -S localhost -U SA -P 'YourStrong!Passw0rd' -Q 'SELECT 1'" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Install ODBC driver.
        env:
          ODBC_VERSION: ${{ matrix.mssql.odbc-version }}
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          . /etc/os-release
          echo "deb [arch=amd64,arm64,armhf signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/${VERSION_ID}/prod ${VERSION_CODENAME} main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y "msodbcsql${ODBC_VERSION}"

      - name: Verify ODBC driver installation
        env:
          ODBC_VERSION: ${{ matrix.mssql.odbc-version }}
        run: |
          echo "=== Installed ODBC Drivers ==="
          odbcinst -q -d
          echo ""
          echo "=== Expected Driver: ODBC Driver ${ODBC_VERSION} for SQL Server ==="
          if odbcinst -q -d -n "ODBC Driver ${ODBC_VERSION} for SQL Server"; then
            echo "✓ Correct driver version installed!"
          else
            echo "✗ Expected driver not found!"
            exit 1
          fi
          echo ""
          echo "=== ODBC Driver Package Info ==="
          dpkg -l | grep msodbcsql

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create MS SQL Database
        env:
          MSSQL_SQLCMD_FLAG: ${{ matrix.mssql.flag }}
          MSSQL_TOOLS_PATH: ${{ matrix.mssql.tools-path }}
        run: |
          sqlcmd=("${MSSQL_TOOLS_PATH}/bin/sqlcmd")
          if [ -n "$MSSQL_SQLCMD_FLAG" ]; then
            sqlcmd+=("$MSSQL_SQLCMD_FLAG")
          fi
          docker exec -i mssql "${sqlcmd[@]}" -S localhost -U SA -P 'YourStrong!Passw0rd' -Q 'CREATE DATABASE yiitest'

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.extensions }}
          ini-values: date.timezone='UTC'
          coverage: pcov
          tools: composer:v2, pecl

      - name: Determine composer cache directory
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Cache dependencies installed with composer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            php${{ matrix.php }}-composer-

      - name: Update composer
        run: composer self-update

      - name: Install dependencies with composer
        run: composer update --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi

      - name: Run tests with phpunit
        run: vendor/bin/phpunit --testsuite=Mssql --coverage-clover=coverage.xml --colors=always
        env:
          ENVIRONMENT: ci
          CYCLE_MSSQL_DATABASE: yiitest
          CYCLE_MSSQL_HOST: 127.0.0.1
          CYCLE_MSSQL_PORT: 1433
          CYCLE_MSSQL_USER: SA
          CYCLE_MSSQL_PASSWORD: YourStrong!Passw0rd

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
